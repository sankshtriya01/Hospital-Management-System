{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="max-width:400px;margin:80px auto;">
    <div class="card">
        <h1>Login</h1>
        <form method="post" novalidate>
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        {% for error in field.errors %}
                            <p style="color:#dc2626;font-size:12px;margin-top:4px;">{{ error }}</p>
                        {% endfor %}
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:15px;margin-top:4px;">
                Log In
            </button>
        </form>
        <p style="margin-top:16px;font-size:13px;text-align:center;color:#6b7280;">
            No account? <a href="{% url 'signup_choose' %}" style="color:#2563eb;">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
